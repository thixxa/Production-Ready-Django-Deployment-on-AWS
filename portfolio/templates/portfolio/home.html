<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Django on AWS ECS</title>
    <style>
        body {
            font-family: -apple-system, Segoe UI, Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            text-align: center;
            padding: 2.5rem 3rem;
            border-radius: 12px;
            background: #1e293b;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        h1 { color: #38bdf8; margin-bottom: 0.5rem; }
        p { color: #94a3b8; }
        .badge {
            display: inline-block;
            margin-top: 1rem;
            padding: 0.4rem 0.9rem;
            border-radius: 999px;
            background: #0369a1;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🚀 Django on AWS ECS Fargate</h1>
        <p>Containerized with Docker · Stored in ECR · Orchestrated by ECS</p>
        <span class="badge">Deployed successfully</span>
    </div>
</body>
</html>
